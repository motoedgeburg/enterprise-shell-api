# Production configuration — set these via environment variables or secrets manager
spring:
  datasource:
    # url: jdbc:mysql://<host>:3306/<database>?useSSL=true&serverTimezone=UTC
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# Set to your production frontend URL
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://your-app.company.com}

# Set to your Okta production tenant
okta:
  issuer: ${OKTA_ISSUER}
  client-id: ${OKTA_CLIENT_ID}
