server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: shell-api
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

ssn:
  encryption-key: ${SSN_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

okta:
  issuer: ${OKTA_ISSUER:https://your-domain.okta.com/oauth2/default}
  client-id: ${OKTA_CLIENT_ID:your-client-id}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.enterprise.shellapi.controller
